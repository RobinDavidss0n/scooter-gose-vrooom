[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200

; --- Specific 16MB Flash + 2MB QSPI RAM Config for S3R2 ---
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_qspi ; Crucial change to Quad SPI for the 2MB chip
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L

build_flags = 
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -I lib
    -I src

lib_deps = 
    lvgl/lvgl@8.3.8
    LovyanGFX@^1.1.16