; ==============================================================================
; PlatformIO Project Configuration
; Scooter Control — Waveshare ESP32-S3 1.28" Round Touch LCD
; ==============================================================================

[platformio]
default_envs = scooter_ctrl

; ------------------------------------------------------------------------------
[env:scooter_ctrl]
platform  = espressif32 @ ^6.9.0
board     = esp32-s3-devkitc-1
framework = arduino

; --- Flash & PSRAM -----------------------------------------------------------
; Waveshare ESP32-S3 1.28" has 16 MB flash + 8 MB OPI PSRAM
board_build.flash_mode  = qio
board_build.psram_type  = opi
board_upload.flash_size = 16MB
board_build.partitions  = default_16MB.csv
board_build.filesystem  = spiffs
data_dir                = data

; --- Build flags -------------------------------------------------------------
build_flags =
    ; ESP32-S3: route Serial through USB-CDC (no separate USB-UART chip needed)
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D BOARD_HAS_PSRAM

    ; Increase main-loop stack (LVGL + JSON can be stack-hungry)
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384

    ; Enable core debug output (0=none … 5=verbose).  Set 0 for release.
    -D CORE_DEBUG_LEVEL=1

    ; --- TFT_eSPI: GC9A01 on SPI2 (Waveshare ESP32-S3 1.28") ----------------
    -D USER_SETUP_LOADED=1
    -D GC9A01_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MISO=-1
    -D TFT_MOSI=11
    -D TFT_SCLK=10
    -D TFT_CS=9
    -D TFT_DC=8
    -D TFT_RST=12
    -D TFT_BL=40
    -D TFT_BACKLIGHT_ON=HIGH
    -D USE_HSPI_PORT
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    ; 40 MHz SPI — stable frequency for GC9A01 on ESP32-S3
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

    ; --- LVGL 8.x configuration ----------------------------------------------
    ; Tell LVGL to find lv_conf.h in the include/ directory
    -D LV_CONF_INCLUDE_SIMPLE=1
    -I "${PROJECT_DIR}/include"
    -I "${PROJECT_DIR}/src"

; --- Dependencies (all pinned to specific minor versions for reproducibility)-
lib_deps =
    bodmer/TFT_eSPI            @ ^2.5.43
    lvgl/lvgl                  @ ^8.3.11
    bblanchon/ArduinoJson      @ ^7.1.0
    ; AsyncTCP + ESPAsyncWebServer: maintained forks with ESP32-S3 support
    mathieucarbou/AsyncTCP         @ ^3.3.2
    mathieucarbou/ESPAsyncWebServer @ ^3.3.14

; Let PlatformIO scan all source directories for headers (needed for LVGL)
lib_ldf_mode = deep+
lib_compat_mode = strict

; --- Upload & monitor --------------------------------------------------------
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time
upload_speed    = 921600

; Optional: uncomment to build with full optimisation for release
; build_type = release
